name: kartly_e_commerce
description: "A new Flutter Kartly E-commerce app project created by Themelooks."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.7.2
  iconsax_flutter: ^1.0.1
  http: ^1.5.0
  carousel_slider: ^5.1.1
  get_storage: ^2.1.1
  intl: ^0.20.2
  auto_size_text: ^3.0.0
  smooth_page_indicator: ^1.2.1
  app_links: ^6.3.2
  share_plus: ^12.0.0
  scrollable_positioned_list: ^0.3.8
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  intl_phone_field: ^3.2.0
  phone_form_field: ^10.0.0
  image_picker: ^1.2.0
  mime: ^1.0.4
  http_parser: ^4.0.2
  phone_numbers_parser: ^9.0.15
  flutter_widget_from_html: ^0.17.1
  html: ^0.15.5
  youtube_player_iframe: ^5.2.2
  webview_flutter: ^4.7.0
  webview_flutter_android: ^4.9.0
  webview_flutter_wkwebview: ^3.13.1
  url_launcher: ^6.3.0
  dropdown_button2: ^2.3.9
  connectivity_plus: ^7.0.0
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.3
  change_app_package_name: ^1.5.0
  file_picker: ^10.3.7
  onesignal_flutter: ^5.2.5
  app_settings: ^5.1.1
  package_info_plus: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Bold.ttf
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-SemiBold.ttf
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Bold.ttf
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-SemiBold.ttf
    - family: NotoSansBengali
      fonts:
        - asset: assets/fonts/NotoSansBengali-Bold.ttf
        - asset: assets/fonts/NotoSansBengali-Regular.ttf
        - asset: assets/fonts/NotoSansBengali-SemiBold.ttf
